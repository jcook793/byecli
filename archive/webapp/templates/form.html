{% extends "base.html" %}
{% block title %}{{ 'Edit' if item else 'Add' }} item — eBay Tracker{% endblock %}
{% block content %}

<section class="panel form-panel">
  <h2>{{ 'Edit item' if item else 'Add item' }}</h2>
  <form method="post" class="item-form">
    <label class="full">
      <span>Item name</span>
      <input name="name" required autofocus value="{{ item.name if item else '' }}"
             placeholder="Canon 50mm f/1.8 lens">
    </label>

    <label>
      <span>Source</span>
      <select name="source">
        <option value="flip" {{ 'selected' if item and item.source == 'flip' }}>Flip (bought to resell)</option>
        <option value="declutter" {{ 'selected' if item and item.source == 'declutter' }}>Declutter</option>
      </select>
    </label>
    <label>
      <span>Cost basis <small>0 for declutter</small></span>
      <input name="cost_basis" type="number" step="0.01" min="0"
             value="{{ item.cost_basis if item else '' }}" placeholder="0.00">
    </label>

    <label>
      <span>Date listed</span>
      <input name="date_listed" type="date" value="{{ item.date_listed or '' if item else today }}">
    </label>
    <label>
      <span>Date sold <small>leave blank until it sells</small></span>
      <input name="date_sold" type="date" value="{{ item.date_sold or '' if item else '' }}">
    </label>

    <fieldset class="full">
      <legend>Sale details <small>fill in once sold</small></legend>
      <div class="grid">
        <label>
          <span>Sale price <small>item only</small></span>
          <input name="sale_price" type="number" step="0.01" min="0"
                 value="{{ item.sale_price if item else '' }}" placeholder="0.00">
        </label>
        <label>
          <span>Shipping charged <small>what the buyer paid</small></span>
          <input name="shipping_charged" type="number" step="0.01" min="0"
                 value="{{ item.shipping_charged if item else '' }}" placeholder="0.00">
        </label>
        <label>
          <span>Label cost <small>Pirate Ship</small></span>
          <input name="label_cost" type="number" step="0.01" min="0"
                 value="{{ item.label_cost if item else '' }}" placeholder="0.00">
        </label>
        <label>
          <span>eBay fees <small>from payout details</small></span>
          <input name="ebay_fees" type="number" step="0.01" min="0"
                 value="{{ item.ebay_fees if item else '' }}" placeholder="0.00">
        </label>
        <label>
          <span>Other costs <small>packaging, promoted listing…</small></span>
          <input name="other_costs" type="number" step="0.01" min="0"
                 value="{{ item.other_costs if item else '' }}" placeholder="0.00">
        </label>
      </div>
    </fieldset>

    <label class="full">
      <span>Notes</span>
      <input name="notes" value="{{ item.notes if item else '' }}" placeholder="optional">
    </label>

    <div class="form-actions full">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn" href="{{ url_for('index') }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
