name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: byecli
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: byecli/go.mod
          cache-dependency-path: byecli/go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: go build .
